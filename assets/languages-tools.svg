  <rect x="36" y="216" width="6" height="94" rx="3" fill="#58a6ff" />
  <text x="62" y="249" class="lane-label">PRODUCT SURFACE</text>
  <text x="62" y="276" class="lane-title">Web &amp; APIs</text>
  <line x1="420" y1="263" x2="468" y2="263" class="connector" />
  <line x1="660" y1="263" x2="708" y2="263" class="connector" />
  <line x1="900" y1="263" x2="948" y2="263" class="connector" />
  <rect x="230" y="233" width="190" height="60" rx="12" fill="#21262d" stroke="#58a6ff" />
  <rect x="470" y="233" width="190" height="60" rx="12" fill="#21262d" stroke="#58a6ff" />
  <rect x="710" y="233" width="190" height="60" rx="12" fill="#21262d" stroke="#58a6ff" />
  <rect x="950" y="233" width="190" height="60" rx="12" fill="#21262d" stroke="#58a6ff" />
