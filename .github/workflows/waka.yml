name: Refresh WakaTime Activity

on:
  workflow_dispatch:

concurrency:
  group: profile-wakatime
  cancel-in-progress: true

jobs:
  update-readme:
    name: Update README with WakaTime activity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout profile repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Render the last seven days of WakaTime activity
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
        run: python3 scripts/update_wakatime.py

      - name: Commit a changed activity section
        run: |
          if git diff --quiet -- README.md; then
            echo "WakaTime section is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- README.md
          git commit -m "chore(profile): refresh WakaTime activity"
          git push
