  <rect x="36" y="436" width="6" height="94" rx="3" fill="#3fb950" />
  <text x="62" y="469" class="lane-label">DELIVERY LOOP</text>
  <text x="62" y="496" class="lane-title">Engineering</text>
  <line x1="420" y1="483" x2="468" y2="483" class="connector" />
  <line x1="660" y1="483" x2="708" y2="483" class="connector" />
  <line x1="900" y1="483" x2="948" y2="483" class="connector" />
  <rect x="230" y="453" width="190" height="60" rx="12" fill="#21262d" stroke="#3fb950" />
  <rect x="470" y="453" width="190" height="60" rx="12" fill="#21262d" stroke="#3fb950" />
  <rect x="710" y="453" width="190" height="60" rx="12" fill="#21262d" stroke="#3fb950" />
  <rect x="950" y="453" width="190" height="60" rx="12" fill="#21262d" stroke="#3fb950" />
  <text x="325" y="488" class="node">GitHub Actions</text>
  <text x="565" y="481" class="node">Deterministic</text>
  <text x="565" y="499" class="node-note">tests</text>
  <text x="805" y="481" class="node">Adversarial</text>
  <text x="805" y="499" class="node-note">review</text>
