<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="570" viewBox="0 0 1200 570" role="img" aria-labelledby="title desc">
  <title id="title">Languages and tools map</title>
  <desc id="desc">Four product surfaces show the technologies used from implementation through verified delivery.</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117" />
      <stop offset="1" stop-color="#161b22" />
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#484f58" />
    </marker>
    <style>
      .heading { fill: #f0f6fc; font: 700 30px Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .subtitle { fill: #8b949e; font: 400 16px Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .lane-title { fill: #f0f6fc; font: 700 17px Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .lane-label { fill: #8b949e; font: 600 11px Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 1.2px; }
      .node { fill: #f0f6fc; font: 600 15px Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-anchor: middle; }
      .node-note { fill: #8b949e; font: 400 12px Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-anchor: middle; }
      .connector { stroke: #484f58; stroke-width: 2; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="1" y="1" width="1198" height="568" rx="24" fill="url(#background)" stroke="#30363d" stroke-width="2" />
  <text x="42" y="50" class="heading">Languages &amp; Tools</text>
  <text x="42" y="77" class="subtitle">Product surfaces connected by a proof-first delivery loop.</text>

  <!-- Native iOS -->
  <rect x="36" y="106" width="1128" height="94" rx="16" fill="#161b22" stroke="#30363d" />
  <rect x="36" y="106" width="6" height="94" rx="3" fill="#ff7b72" />
  <text x="62" y="139" class="lane-label">PRODUCT SURFACE</text>
  <text x="62" y="166" class="lane-title">Native iOS</text>
  <line x1="420" y1="153" x2="468" y2="153" class="connector" />
  <line x1="660" y1="153" x2="708" y2="153" class="connector" />
  <line x1="900" y1="153" x2="948" y2="153" class="connector" />
  <rect x="230" y="123" width="190" height="60" rx="12" fill="#21262d" stroke="#ff7b72" />
  <rect x="470" y="123" width="190" height="60" rx="12" fill="#21262d" stroke="#ff7b72" />
  <rect x="710" y="123" width="190" height="60" rx="12" fill="#21262d" stroke="#ff7b72" />
  <rect x="950" y="123" width="190" height="60" rx="12" fill="#21262d" stroke="#ff7b72" />
