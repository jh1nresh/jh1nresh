# Archived legacy workflow. Files outside .github/workflows are not executable by GitHub Actions.
name: Legacy Profile Metrics

on:
  workflow_dispatch:

jobs:
  github-metrics-3d-contrib:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: 3D Isometric Calendar
        uses: yoshi389111/github-profile-3d-contrib@fd54cf20784ed9a86dc7be48bb5eb1f74e92b4f8 # 0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A .
          git diff --quiet && git diff --staged --quiet || (git commit -m "generated" && git pull --rebase && git push)

  github-metrics-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Stats Overview
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6
        with:
          filename: metrics.overview.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          user: ${{ github.repository_owner }}
          base: header, activity, community, repositories
          config_timezone: Asia/Taipei
          plugin_lines: yes
          plugin_achievements: yes
          plugin_achievements_display: compact

      - name: Language Stats
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6
        with:
          filename: metrics.languages.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          user: ${{ github.repository_owner }}
          base: ""
          config_timezone: Asia/Taipei
          plugin_languages: yes
          plugin_languages_ignored: >-
            tex, less, dockerfile, makefile, qmake, lex, cmake, shell,
            gnuplot
          plugin_languages_threshold: 0%
          plugin_languages_limit: 8
