  <text x="62" y="386" class="lane-title">Onchain</text>
  <line x1="420" y1="373" x2="468" y2="373" class="connector" />
  <line x1="660" y1="373" x2="708" y2="373" class="connector" />
  <line x1="900" y1="373" x2="948" y2="373" class="connector" />
  <rect x="230" y="343" width="190" height="60" rx="12" fill="#21262d" stroke="#a371f7" />
  <rect x="470" y="343" width="190" height="60" rx="12" fill="#21262d" stroke="#a371f7" />
  <rect x="710" y="343" width="190" height="60" rx="12" fill="#21262d" stroke="#a371f7" />
  <rect x="950" y="343" width="190" height="60" rx="12" fill="#21262d" stroke="#a371f7" />
  <text x="325" y="378" class="node">Solidity · Rust</text>
  <text x="565" y="378" class="node">Foundry · Anchor</text>
  <text x="805" y="378" class="node">EAS</text>
