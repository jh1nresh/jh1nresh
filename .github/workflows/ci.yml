name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    uses: jh1nresh/.github/.github/workflows/docs-ci.yml@0cb6fd5b730ced897c767d1c9979aba4e49d201d
    with:
